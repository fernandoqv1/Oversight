/* ============================================================================
   OVERSIGHT REDESIGN — DESIGN SYSTEM (project.html)
   ============================================================================ */
:root {
  --accent: #015dab;
  --accent-soft: color-mix(in oklch, var(--accent) 12%, transparent);
  --accent-strong: color-mix(in oklch, var(--accent) 80%, black);
  --bg:#FAFAF7; --bg-sunken:#F4F3EE; --surface:#FFFFFF; --surface-2:#FCFBF8; --surface-hover:#F5F4EF;
  --border:#E8E5DE; --border-strong:#D5D1C7;
  --text:#14130F; --text-2:#4A4943; --text-muted:#8A887E; --text-faint:#B6B3A8;
  --side-bg:#1B1A17; --side-surface:#25231F; --side-border:#2F2D28;
  --side-text:#E9E7DF; --side-text-muted:#8B887D; --side-text-faint:#5C5A53;
  --st-prep-bg:#DCE7F8; --st-prep-fg:#1E3A8A;
  --st-active-bg:#F8E4C4; --st-active-fg:#92400E;
  --st-clear-bg:#E8DDF5; --st-clear-fg:#5B21B6;
  --st-down-bg:#F8D5BC; --st-down-fg:#9A3412;
  --st-done-bg:#D2E9D6; --st-done-fg:#14532D;
  --ok:#15803D; --ok-bg:#DCEEDA;
  --warn:#B45309; --warn-bg:#F8E4C4;
  --alert:#B91C1C; --alert-bg:#F4D7D3;
  --info:#1E40AF; --info-bg:#DCE7F8;
  --radius:8px; --radius-lg:12px; --radius-sm:6px;
  --shadow-sm:0 1px 2px rgba(20,19,15,0.04);
  --shadow:0 1px 3px rgba(20,19,15,0.05), 0 0 0 1px rgba(20,19,15,0.03);
  --shadow-lg:0 12px 32px -8px rgba(20,19,15,0.18);
}
[data-theme="dark"] {
  --bg:#100F0C; --bg-sunken:#0A0908; --surface:#181612; --surface-2:#1D1B16; --surface-hover:#221F1A;
  --border:#2A2823; --border-strong:#3A3731;
  --text:#ECE9DF; --text-2:#B6B2A4; --text-muted:#7A766B; --text-faint:#4F4D45;
  --side-bg:#060604; --side-surface:#0E0D0A; --side-border:#1A1814;
  --st-prep-bg:#1E2A4A; --st-prep-fg:#BFD0F2;
  --st-active-bg:#3A2A14; --st-active-fg:#F4C97D;
  --st-clear-bg:#2E1F44; --st-clear-fg:#D7C2F2;
  --st-down-bg:#3A2114; --st-down-fg:#F4B888;
  --st-done-bg:#142E1E; --st-done-fg:#97D5A4;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.5);
  --shadow:0 1px 3px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04);
  --shadow-lg:0 12px 32px -8px rgba(0,0,0,0.6);
}
[data-density="compact"] { --tab-pad:8px 12px; }
[data-density="comfortable"], :root { --tab-pad:10px 14px; }

*,*::before,*::after { box-sizing:border-box; }
html, body { margin:0; padding:0; height:100%; }
body { font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text); font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; font-feature-settings:'cv11','ss01'; }
button { font:inherit; color:inherit; background:none; border:none; cursor:pointer; padding:0; }
input, select, textarea { font:inherit; color:inherit; }
a { color:inherit; text-decoration:none; }
.mono { font-family:ui-monospace,'IBM Plex Mono',SFMono-Regular,Menlo,monospace; font-feature-settings:'zero','ss01'; }
.small { font-size:12px; }
.muted { color:var(--text-muted); }
[data-mono-num="on"] .stat-num, [data-mono-num="on"] .kpi-num, [data-mono-num="on"] .cdet-kpi-v { font-family:ui-monospace,'IBM Plex Mono',monospace; font-weight:500; letter-spacing:-0.02em; }

.app-shell { height:100vh; display:flex; }

/* SIDEBAR (same as index.html) */
.sidebar { width:256px; background:var(--side-bg); color:var(--side-text); display:flex; flex-direction:column; border-right:1px solid var(--side-border); flex-shrink:0; transition:width 200ms ease; }
.sidebar[data-collapsed="true"] { width:64px; }
.sidebar-brand { display:flex; align-items:center; gap:10px; padding:18px 16px 16px; }
.brand-mark { width:32px; height:32px; background:linear-gradient(135deg,var(--accent),color-mix(in oklch,var(--accent) 60%,black)); color:white; border-radius:8px; display:grid; place-items:center; flex-shrink:0; }
.brand-text { display:flex; flex-direction:column; line-height:1.2; min-width:0; }
.brand-name { font-size:15px; font-weight:600; color:var(--side-text); }
.brand-org { font-size:11px; color:var(--side-text-muted); margin-top:1px; }
.sidebar[data-collapsed="true"] .brand-text { display:none; }
.sidebar-toggle { margin-left:auto; color:var(--side-text-muted); }
.sidebar-toggle:hover { background:var(--side-surface); color:var(--side-text); }
.sidebar[data-collapsed="true"] .sidebar-brand { flex-direction:column; gap:8px; padding:16px 12px 10px; }
.sidebar[data-collapsed="true"] .sidebar-toggle { margin-left:0; }
.sidebar-nav { padding:4px 8px 12px; display:flex; flex-direction:column; gap:1px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:8px 10px; color:var(--side-text-muted); border-radius:6px; font-size:13px; font-weight:500; width:100%; text-align:left; }
.nav-item:hover { background:var(--side-surface); color:var(--side-text); }
.nav-item[data-active="true"] { background:var(--side-surface); color:var(--side-text); }
.nav-label { flex:1; }
.sidebar[data-collapsed="true"] .nav-label, .sidebar[data-collapsed="true"] .nav-count { display:none; }
.nav-count { font-size:11px; background:rgba(255,255,255,0.06); padding:1px 6px; border-radius:999px; color:var(--side-text-muted); }
.sidebar-section { flex:1; padding:6px 8px; overflow:auto; min-height:0; }
.sidebar[data-collapsed="true"] .sidebar-section { display:none; }
.sidebar-label { font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; color:var(--side-text-faint); padding:12px 10px 6px; font-weight:600; }
.sidebar-projects { display:flex; flex-direction:column; gap:1px; }
.proj-item { display:flex; align-items:center; gap:10px; padding:7px 10px; border-radius:6px; text-align:left; color:var(--side-text-muted); width:100%; min-width:0; }
.proj-item:hover { background:var(--side-surface); color:var(--side-text); }
.proj-item[data-active="true"] { background:var(--side-surface); color:var(--side-text); box-shadow:inset 2px 0 0 var(--accent); }
.proj-dot { width:6px; height:6px; border-radius:50%; background:#4ADE80; flex-shrink:0; }
.proj-dot[data-overdue="true"] { background:#F87171; }
.proj-dot[data-status="completed"] { background:#94A3B8; }
.proj-text { display:flex; flex-direction:column; min-width:0; flex:1; }
.proj-num { font-family:ui-monospace,'IBM Plex Mono',monospace; font-size:11px; color:var(--side-text-faint); }
.proj-site { font-size:13px; color:inherit; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sidebar-foot { padding:10px 12px; border-top:1px solid var(--side-border); }
.inspector-card { display:flex; align-items:center; gap:10px; width:100%; }
.inspector-card:hover .ins-name { color:var(--accent); }
.ins-avatar { width:28px; height:28px; border-radius:999px; background:linear-gradient(135deg,var(--accent),color-mix(in oklch,var(--accent) 60%,black)); color:white; display:grid; place-items:center; font-size:11px; font-weight:600; flex-shrink:0; }
.ins-text { display:flex; flex-direction:column; line-height:1.25; min-width:0; text-align:left; }
.sidebar[data-collapsed="true"] .ins-text { display:none; }
.ins-name { font-size:13px; color:var(--side-text); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ins-meta { font-size:11px; color:var(--side-text-faint); font-family:ui-monospace,'IBM Plex Mono',monospace; }

/* APP MAIN */
.app-main { flex:1; display:flex; flex-direction:column; min-width:0; }
.app-content { flex:1; overflow:auto; }

/* TOPBAR */
.topbar { height:52px; display:flex; align-items:center; border-bottom:1px solid var(--border); background:var(--surface); padding:0 20px; gap:16px; flex-shrink:0; }
.topbar-left { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.topbar-mid { flex:1; max-width:480px; }
.topbar-right { display:flex; align-items:center; gap:6px; margin-left:auto; }
.crumbs { display:flex; align-items:center; gap:6px; font-size:13px; }
.crumb { color:var(--text-muted); }
.crumb a { color:var(--text-muted); }
.crumb a:hover { color:var(--text); }
.crumb-current { color:var(--text); font-weight:500; }
.crumb-sep { color:var(--text-faint); }
.search { display:flex; align-items:center; gap:8px; padding:6px 12px; background:var(--bg-sunken); border:1px solid var(--border); border-radius:8px; width:100%; color:var(--text-muted); }
.search input { flex:1; border:none; outline:none; background:none; font-size:13px; color:var(--text); }
.search input::placeholder { color:var(--text-muted); }
.kbd { font-family:ui-monospace,'IBM Plex Mono',monospace; font-size:10.5px; padding:2px 6px; background:var(--surface); border:1px solid var(--border); border-radius:4px; color:var(--text-muted); }

/* BUTTONS */
.btn-primary, .btn-ghost { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:7px; font-size:13px; font-weight:500; white-space:nowrap; transition:background 120ms, border-color 120ms; }
.btn-primary { background:var(--accent); color:white; border:none; }
.btn-primary:hover { background:var(--accent-strong); }
.btn-primary.small { padding:4px 10px; font-size:12px; }
.btn-primary:disabled, .btn-ghost:disabled, .icon-btn:disabled { opacity:0.45; cursor:not-allowed; pointer-events:none; }
.btn-ghost { background:var(--surface); color:var(--text-2); border:1px solid var(--border); }
.btn-ghost:hover { background:var(--surface-hover); border-color:var(--border-strong); color:var(--text); }
.btn-ghost.small { padding:4px 10px; font-size:12px; }
.btn-ghost.danger { color:var(--alert); border-color:color-mix(in srgb,var(--alert) 30%,var(--border)); }
.btn-ghost.danger:hover { background:var(--alert-bg); color:var(--alert); }
.btn-link { color:var(--accent); font-size:13px; font-weight:500; }
.btn-link:hover { color:var(--accent-strong); text-decoration:underline; }
.btn-link.small { font-size:12px; }
.icon-btn { width:30px; height:30px; display:grid; place-items:center; border-radius:6px; color:var(--text-muted); position:relative; }
.icon-btn:hover { background:var(--surface-hover); color:var(--text); }

/* PROJECT WORKSPACE */
.project-view { padding:0; }
.proj-head { padding:22px 32px 18px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap; }
.proj-head-main { flex:1; min-width:0; }
.proj-head-row { display:flex; align-items:center; gap:10px; }
.pill-num { font-size:12px; padding:3px 8px; background:var(--bg-sunken); border:1px solid var(--border); border-radius:5px; color:var(--text-2); font-family:ui-monospace,'IBM Plex Mono',monospace; }
.status-pill { display:inline-flex; align-items:center; gap:6px; font-size:12px; padding:3px 9px; border-radius:5px; }
.status-pill .dot { width:6px; height:6px; border-radius:50%; }
.status-pill.active { background:var(--ok-bg); color:var(--ok); }
.status-pill.active .dot { background:var(--ok); }
.status-pill.done { background:var(--bg-sunken); color:var(--text-muted); }
.status-pill.done .dot { background:var(--text-muted); }
.status-pill.overdue { background:var(--alert-bg); color:var(--alert); }
.status-pill.overdue .dot { background:var(--alert); }
.proj-head-main .page-title { margin-top:6px; font-size:26px; font-weight:600; letter-spacing:-0.012em; }
.proj-head-meta { display:flex; align-items:center; gap:10px; flex-wrap:wrap; font-size:13px; color:var(--text-2); margin-top:6px; }
.proj-head-meta span { display:inline-flex; align-items:center; gap:6px; }
.proj-head-side { display:flex; flex-direction:column; align-items:flex-end; gap:14px; min-width:280px; }
.head-kpi { display:flex; align-items:center; gap:10px; }
.kpi-label { font-size:12px; color:var(--text-muted); }
.kpi-bar { width:180px; height:6px; background:var(--bg-sunken); border-radius:3px; overflow:hidden; }
.kpi-bar > span { display:block; height:100%; background:var(--accent); transition:width 200ms ease; }
.kpi-val { font-size:13px; font-weight:600; }

/* TABS */
.proj-tabs { display:flex; gap:2px; padding:0 24px; border-bottom:1px solid var(--border); background:var(--surface); overflow-x:auto; }
.proj-tab { display:flex; align-items:center; gap:8px; padding:var(--tab-pad); font-size:13px; color:var(--text-muted); border-bottom:2px solid transparent; margin-bottom:-1px; white-space:nowrap; font-weight:500; }
.proj-tab:hover { color:var(--text); }
.proj-tab[data-active="true"] { color:var(--text); border-bottom-color:var(--accent); }
.tab-count { font-size:11px; padding:1px 6px; border-radius:999px; background:var(--bg-sunken); color:var(--text-muted); font-family:ui-monospace,'IBM Plex Mono',monospace; }
.proj-content { padding:24px 32px 60px; }
.tab-pane[hidden] { display:none; }
.placeholder { padding:60px; text-align:center; color:var(--text-muted); font-size:13px; }

/* OVERVIEW */
.kpi-row { display:grid; grid-template-columns:repeat(6,1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; margin-bottom:20px; }
.kpi { background:var(--surface); padding:16px 18px; }
.kpi-warn { background:var(--warn-bg); }
.kpi-ok { background:color-mix(in oklch,var(--ok-bg) 60%,var(--surface)); }
.kpi-l { font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted); font-weight:600; }
.kpi-v { display:flex; align-items:baseline; gap:4px; margin-top:6px; }
.kpi-num { font-size:24px; font-weight:600; letter-spacing:-0.02em; }
.kpi-unit { color:var(--text-muted); font-size:13px; }
.kpi-s { font-size:12px; color:var(--text-muted); margin-top:2px; }

.ovr-grid { display:grid; grid-template-columns:1.5fr 1fr; gap:16px; }
@media (max-width: 1100px) { .ovr-grid { grid-template-columns:1fr; } }

.panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
.panel-head { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); background:var(--surface-2); }
.panel-title { font-size:13px; font-weight:600; margin:0; letter-spacing:0.01em; color:var(--text); }
.panel-body { padding:14px 18px; }

.lifecycle { padding:8px 0; }
.lifecycle-row { padding:16px 20px; border-bottom:1px solid var(--border); }
.lifecycle-row:last-child { border-bottom:none; }
.lc-head { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.lc-code { font-size:13px; font-weight:500; font-family:ui-monospace,'IBM Plex Mono',monospace; }
.lc-name { font-weight:500; }
.lc-track { display:flex; align-items:center; margin-top:14px; }
.lc-step { display:flex; flex-direction:column; align-items:center; gap:6px; min-width:88px; }
.lc-dot { width:22px; height:22px; border-radius:50%; background:var(--border); display:grid; place-items:center; color:var(--surface); font-size:11px; font-weight:600; flex-shrink:0; }
.lc-dot[data-state="done"] { background:var(--ok); color:#fff; }
.lc-dot[data-state="active"] { background:var(--accent); color:#fff; box-shadow:0 0 0 4px color-mix(in oklch,var(--accent) 20%,transparent); }
.lc-dot[data-state="pending"] { background:var(--bg-sunken); color:var(--text-muted); border:1px solid var(--border); }
.lc-label { font-size:11px; color:var(--text-muted); text-align:center; max-width:80px; line-height:1.2; }
.lc-bar { flex:1; height:2px; background:var(--border); position:relative; top:-14px; min-width:8px; }
.lc-bar[data-done="true"] { background:var(--ok); }

.tag { font-size:11px; padding:2px 7px; border-radius:4px; background:var(--bg-sunken); color:var(--text-2); font-weight:500; }
.tag-reg { background:var(--alert-bg); color:var(--alert); }
.tag-done { background:var(--ok-bg); color:var(--ok); }
.tag-background { background:var(--st-prep-bg); color:var(--st-prep-fg); }
.tag-area { background:var(--st-clear-bg); color:var(--st-clear-fg); }
.tag-personal { background:var(--st-active-bg); color:var(--st-active-fg); }
.tag-clearance { background:var(--st-done-bg); color:var(--st-done-fg); }

.activity-list { list-style:none; padding:6px 0; margin:0; }
.activity-row { display:grid; grid-template-columns:14px 60px 30px 1fr; align-items:center; gap:10px; padding:7px 18px; font-size:13px; }
.act-marker { width:8px; height:8px; border-radius:50%; background:var(--text-faint); }
.act-marker.act-sample { background:var(--info); }
.act-marker.act-log { background:var(--accent); }
.act-marker.act-doc { background:var(--text-muted); }
.act-marker.act-stage { background:var(--ok); }
.act-marker.act-inspection.act-pass { background:var(--ok); }
.act-marker.act-inspection.act-fail { background:var(--alert); }
.act-time { color:var(--text-muted); font-family:ui-monospace,'IBM Plex Mono',monospace; font-size:11px; }
.act-who { font-weight:600; color:var(--text-2); font-size:11px; font-family:ui-monospace,'IBM Plex Mono',monospace; }
.act-text { color:var(--text-2); }

/* STAGE BADGE */
.stage-badge { display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:500; padding:2px 7px; border-radius:4px; line-height:1; }
.stage-dot { width:6px; height:6px; border-radius:50%; }
.stage-prep { background:var(--st-prep-bg); color:var(--st-prep-fg); }
.stage-prep .stage-dot { background:var(--st-prep-fg); }
.stage-active { background:var(--st-active-bg); color:var(--st-active-fg); }
.stage-active .stage-dot { background:var(--st-active-fg); }
.stage-clear { background:var(--st-clear-bg); color:var(--st-clear-fg); }
.stage-clear .stage-dot { background:var(--st-clear-fg); }
.stage-down { background:var(--st-down-bg); color:var(--st-down-fg); }
.stage-down .stage-dot { background:var(--st-down-fg); }
.stage-done { background:var(--st-done-bg); color:var(--st-done-fg); }
.stage-done .stage-dot { background:var(--st-done-fg); }

/* MASTER-DETAIL */
.masterdetail { display:grid; grid-template-columns:320px 1fr; gap:16px; align-items:start; }
@media (max-width: 980px) { .masterdetail { grid-template-columns:1fr; } }
.md-list { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); display:flex; flex-direction:column; overflow:hidden; position:sticky; top:24px; max-height:calc(100vh - 200px); }
.md-list-head { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); background:var(--surface-2); }
.md-list-title { font-size:12px; font-weight:600; color:var(--text-2); }
.md-list-body { flex:1; overflow-y:auto; }
.md-row { display:flex; flex-direction:column; gap:4px; padding:12px 16px; border-bottom:1px solid var(--border); text-align:left; cursor:pointer; transition:background 120ms; border-left:2px solid transparent; width:100%; }
.md-row:hover { background:var(--surface-hover); }
.md-row[data-active="true"] { background:var(--accent-soft); border-left-color:var(--accent); }
.md-row-top { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.md-code { font-size:12px; font-weight:500; font-family:ui-monospace,'IBM Plex Mono',monospace; }
.md-row-name { font-size:14px; font-weight:500; }
.md-row-meta { display:flex; align-items:center; gap:6px; }
.md-row-stats { display:flex; gap:10px; margin-top:2px; }
.mini-stat { display:inline-flex; align-items:center; gap:4px; font-size:11px; color:var(--text-muted); }
.md-add { display:flex; align-items:center; justify-content:center; gap:6px; padding:12px; font-size:13px; color:var(--text-muted); width:100%; border-top:1px solid var(--border); font-weight:500; }
.md-add:hover { background:var(--surface-hover); color:var(--text); }

.cdetail { display:flex; flex-direction:column; gap:16px; }
.cdetail-head { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; padding:20px 24px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); }
.cdetail-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.cdetail-title { font-size:22px; font-weight:600; margin:6px 0 6px; letter-spacing:-0.01em; }
.cdetail-meta { display:flex; align-items:center; gap:10px; flex-wrap:wrap; font-size:13px; color:var(--text-2); }
.cdetail-actions { display:flex; gap:8px; }
.cdetail-kpis { display:grid; grid-template-columns:repeat(5,1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
.cdet-kpi { background:var(--surface); padding:12px 16px; }
.cdet-kpi-l { font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted); font-weight:600; }
.cdet-kpi-v { font-size:16px; font-weight:600; margin-top:2px; }
.kpi-ok { color:var(--ok); }
.cdetail-next { display:flex; align-items:center; gap:10px; padding:12px 18px; background:var(--accent-soft); border-radius:var(--radius-lg); font-size:13px; border:1px solid color-mix(in oklch,var(--accent) 22%,transparent); }
.cdetail-next > svg { color:var(--accent); flex-shrink:0; }
.cdetail-next--done { background:color-mix(in oklch,#16a34a 12%,var(--surface)); border-color:color-mix(in oklch,#16a34a 28%,transparent); }
.cdetail-next--done > svg { color:#16a34a; }
.cnext-label { color:var(--text-muted); }
.cnext-due { margin-left:auto; color:var(--text-2); }
.cdetail-cols { display:grid; grid-template-columns:1.4fr 1fr; gap:16px; }
@media (max-width: 1100px) { .cdetail-cols { grid-template-columns:1fr; } }
.log-list { list-style:none; padding:0; margin:0; }
.log-row { display:grid; grid-template-columns:48px 1fr; gap:14px; padding:14px 18px; border-bottom:1px solid var(--border); }
.log-row:last-child { border-bottom:none; }
.log-date { text-align:center; line-height:1.1; }
.log-day { font-size:18px; font-weight:600; }
.log-mon { text-transform:uppercase; letter-spacing:0.04em; font-size:10px; color:var(--text-muted); margin-top:3px; }
.log-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:12px; color:var(--text-2); }
.log-note { margin-top:6px; font-size:13px; color:var(--text-2); line-height:1.55; }
.samp-mini { padding:4px 0; }
.samp-row-mini { display:grid; grid-template-columns:1.4fr 1.4fr 1.4fr; gap:10px; align-items:center; padding:8px 18px; border-bottom:1px solid var(--border); font-size:13px; }
.samp-row-mini:last-child { border-bottom:none; }
.samp-l { display:flex; align-items:center; gap:8px; }
.samp-r { display:flex; align-items:center; justify-content:flex-end; gap:8px; }
.samp-status { font-size:11px; padding:2px 7px; border-radius:4px; font-weight:500; }
.status-complete { background:var(--ok-bg); color:var(--ok); }
.status-collected { background:var(--warn-bg); color:var(--warn); }
.status-running { background:var(--info-bg); color:var(--info); }
.mat-list { list-style:none; padding:0; margin:0; }
.mat-row { padding:12px 18px; border-bottom:1px solid var(--border); }
.mat-row:last-child { border-bottom:none; }
.mat-name { font-size:14px; font-weight:500; }
.history-list { list-style:none; padding:12px 0; margin:0; }
.hist-row { display:flex; align-items:center; gap:10px; padding:6px 18px; font-size:13px; }
.hist-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); }
.hist-dot[data-active="true"] { box-shadow:0 0 0 4px color-mix(in oklch,var(--accent) 18%,transparent); }
.hist-stage { flex:1; }

/* FILTER BAR */
.filter-bar { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.filter-spacer { flex:1; }
.select { padding:5px 10px; background:var(--surface); border:1px solid var(--border); border-radius:7px; font-size:12px; color:var(--text); }

/* SAMPLES TABLE */
.samples-table { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; margin-bottom:14px; }
.samp-th, .samp-tr { display:grid; grid-template-columns:1.1fr 0.9fr 0.7fr 1.1fr 0.7fr 1.1fr 1.1fr 0.9fr 0.8fr; align-items:center; gap:10px; padding:10px 16px; font-size:13px; }
.samp-th { font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted); font-weight:600; background:var(--surface-2); border-bottom:1px solid var(--border); }
.samp-th .r, .samp-tr .r { text-align:right; }
.samp-tr { border-bottom:1px solid var(--border); cursor:pointer; transition:background 120ms; }
.samp-tr:last-child { border-bottom:none; }
.samp-tr:hover { background:var(--surface-hover); }
.samp-tr[data-active="true"] { background:var(--accent-soft); }
.running-pip { display:inline-flex; align-items:center; gap:6px; color:var(--info); }
.run-dot { width:6px; height:6px; border-radius:50%; background:var(--info); animation:pulse 1.6s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.7); } }
.samp-summary { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
.samp-sum { background:var(--surface); padding:12px 16px; }
.samp-sum-warn { background:color-mix(in oklch,var(--warn-bg) 50%,var(--surface)); }
.samp-sum-info { background:color-mix(in oklch,var(--info-bg) 50%,var(--surface)); }
.samp-sum-l { font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted); font-weight:600; }
.samp-sum-v { font-size:20px; font-weight:600; margin-top:2px; }

/* TIMELINE */
.timeline { display:flex; flex-direction:column; gap:8px; }
.tl-day-head { display:flex; align-items:center; gap:14px; padding:14px 4px 8px; }
.tl-date { display:flex; flex-direction:column; line-height:1; min-width:36px; align-items:center; }
.tl-d { font-size:22px; font-weight:600; letter-spacing:-0.02em; }
.tl-m { font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color:var(--text-muted); margin-top:4px; }
.tl-rule { flex:1; height:1px; background:var(--border); }
.tl-day-body { display:flex; flex-direction:column; gap:8px; padding-left:60px; position:relative; }
.tl-day-body::before { content:''; position:absolute; left:17px; top:0; bottom:0; width:2px; background:var(--border); }
.tl-entry { position:relative; }
.tl-marker { position:absolute; left:-47px; top:14px; width:12px; height:12px; border-radius:50%; background:var(--surface); border:2px solid var(--accent); }
.tl-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; cursor:pointer; }
.tl-card:hover { border-color:var(--border-strong); }
.tl-card-head { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.tl-card-name { font-weight:500; font-size:13px; }
.tl-note { font-size:13px; color:var(--text-2); line-height:1.55; margin-top:8px; white-space:pre-wrap; }
.tl-meta { display:flex; align-items:center; gap:14px; margin-top:10px; padding-top:10px; border-top:1px dashed var(--border); font-size:12px; color:var(--text-muted); }
.tl-meta > .muted { display:inline-flex; align-items:center; gap:4px; }
.tl-hour-badge { font-size:12px; font-weight:600; padding:2px 8px; border-radius:5px; background:var(--accent-soft); color:var(--accent); }
.tl-pressure { margin-top:8px; display:flex; flex-wrap:wrap; gap:8px; }
.tl-photos-wrap { margin-top:10px; }
.tl-photos { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.tl-photos.hidden { display:none; }
.tl-photo { max-width:min(280px, 100%); max-height:280px; width:auto; height:auto; border-radius:8px; object-fit:contain; border:1px solid var(--border); background:var(--bg-sunken); }
.tl-card-actions { margin-top:8px; }

/* MATERIALS TREE */
.tree { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
.tree-bldg { border-bottom:1px solid var(--border); }
.tree-bldg:last-child { border-bottom:none; }
.tree-bldg-head { display:flex; align-items:center; gap:10px; padding:12px 16px; background:var(--surface-2); font-weight:600; font-size:14px; }
.tree-bldg-head .name { flex:1; }
.tree-bldg-body { padding:0; }
.tree-space { padding:10px 16px 10px 40px; border-top:1px solid var(--border); }
.tree-space-head { display:flex; align-items:center; gap:8px; }
.tree-space-name { font-size:13px; font-weight:500; flex:1; }
.tree-mats { margin-top:8px; padding-left:22px; display:flex; flex-direction:column; gap:2px; }
.tree-mat {
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:14px;
  align-items:center;
  padding:6px 0;
  font-size:13px;
}
.tree-mat-name { font-weight:500; color:var(--text); min-width:0; }
.tree-mat-qty { color:var(--text-muted); white-space:nowrap; }
.tree-mat-add { margin-top:4px; padding-left:0; }
.tree-bldg-foot { padding:10px 16px 12px 40px; border-top:1px dashed var(--border); }
.mat-qty-line { margin-top:4px; }
.mat-row-actions { display:flex; gap:6px; margin-top:8px; }
.mat-type-tag { font-family:inherit; font-size:11px; padding:1px 6px; border-radius:4px; background:var(--bg-sunken); color:var(--text-muted); margin-left:4px; }

.inline-form { display:flex; gap:8px; align-items:center; padding:8px 10px; background:var(--bg-sunken); border:1px solid var(--border); border-radius:7px; margin-top:8px; }
.inline-form input, .inline-form select { flex:1; padding:5px 8px; border:1px solid var(--border); border-radius:6px; background:var(--surface); font-size:13px; min-width:0; }
.inline-form .actions { display:flex; gap:6px; }

/* TEAM GRID */
.team-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:14px; }
.worker-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:14px 16px; display:flex; flex-direction:column; gap:8px; }
.worker-card .head { display:flex; align-items:center; gap:10px; }
.worker-card .avatar { width:36px; height:36px; border-radius:999px; background:linear-gradient(135deg,var(--accent),color-mix(in oklch,var(--accent) 60%,black)); color:#fff; font-weight:600; font-size:13px; display:grid; place-items:center; }
.worker-card .name { font-size:14px; font-weight:600; }
.worker-card .sub { font-size:12px; color:var(--text-muted); }
.worker-card .meta { display:flex; flex-direction:column; gap:4px; font-size:12px; color:var(--text-2); }
.worker-card .meta .lbl { color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:0.04em; }
.worker-card .actions { display:flex; gap:6px; padding-top:6px; border-top:1px dashed var(--border); }
.worker-card .expired { color:var(--alert); font-weight:600; }
.worker-roster-list { display:flex; flex-direction:column; gap:12px; }
.worker-card-warn { border-color:color-mix(in srgb, var(--alert) 35%, var(--border)); background:color-mix(in oklch, var(--alert-bg) 40%, var(--surface)); }
.worker-card .head { justify-content:space-between; align-items:flex-start; gap:12px; }
.worker-card-title { flex:1; min-width:0; }
.worker-card .name-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.worker-badge { font-size:11px; font-weight:600; padding:2px 8px; border-radius:999px; }
.worker-badge-supervisor { background:color-mix(in oklch, #7C3AED 18%, var(--surface)); color:#5B21B6; }
.worker-badge-worker { background:color-mix(in oklch, var(--info-bg) 80%, var(--surface)); color:var(--info); }
.worker-dates-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:10px 14px; }
.worker-dates-grid.compact { margin-top:10px; }
.worker-date-cell { font-size:12px; }
.worker-date-lbl { display:block; font-size:10px; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted); margin-bottom:2px; font-weight:600; }
.worker-resp-line { font-size:13px; color:var(--text-2); margin-top:10px; padding-top:10px; border-top:1px dashed var(--border); }
.worker-resp-line .lbl { color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:0.04em; margin-right:6px; }
.worker-expired-note { font-size:12px; color:var(--alert); margin:8px 0 0; }
.worker-roster-form.panel-body { padding:16px 18px 18px; }
.worker-roster-form .worker-form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
@media (max-width: 720px) { .worker-roster-form .worker-form-row { grid-template-columns:1fr; } }
.worker-field label, .worker-section-lbl { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted); margin-bottom:5px; }
.worker-section-lbl { margin-bottom:8px; }
.worker-field input[type=text], .worker-field input[type=date], .worker-field select { width:100%; background:var(--bg-sunken); border:1px solid var(--border); border-radius:7px; padding:7px 10px; font-size:13px; color:var(--text); }
.worker-field input:focus, .worker-field select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
.worker-resp-checks { display:flex; flex-wrap:wrap; gap:12px 16px; }
.worker-resp-check { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--text-2); cursor:pointer; }
.worker-resp-check input { width:16px; height:16px; accent-color:var(--accent); }
.worker-form-actions { margin-top:16px; padding-top:14px; border-top:1px solid var(--border); }

/* DOCS GRID */
.doc-template-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:14px; margin-bottom:20px; }
.doc-tpl { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:14px 16px; cursor:pointer; transition:border-color 120ms, transform 120ms; display:flex; flex-direction:column; gap:6px; text-align:left; }
.doc-tpl:hover:not(:disabled) { border-color:var(--accent); transform:translateY(-1px); }
.doc-tpl:disabled { opacity:0.45; cursor:not-allowed; }
.doc-tpl .icon { width:32px; height:32px; border-radius:8px; background:var(--accent-soft); color:var(--accent); display:grid; place-items:center; }
.doc-tpl .title { font-size:14px; font-weight:600; margin-top:4px; }
.doc-tpl .desc { font-size:12px; color:var(--text-muted); line-height:1.45; }

/* MODAL */
.modal { display:none; position:fixed; z-index:10001; left:0; top:0; width:100%; height:100%; overflow:auto; background-color:rgba(20,19,15,0.45); backdrop-filter:blur(5px); align-items:flex-start; justify-content:center; padding:24px 16px; pointer-events:auto; }
.modal.active { display:flex; }
.modal-content { position:relative; z-index:1; pointer-events:auto; isolation:isolate; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); width:100%; max-width:680px; max-height:calc(100vh - 48px); overflow-y:auto; padding:0; margin:auto; }
.modal-content > h3 { padding:16px 22px; margin:0; font-size:15px; font-weight:600; letter-spacing:0.01em; color:var(--text); background:var(--surface-2); border-bottom:1px solid var(--border); border-radius:var(--radius-lg) var(--radius-lg) 0 0; position:sticky; top:0; z-index:2; }
.modal-content > h3 ~ :not(.modal-footer) { padding-left:22px; padding-right:22px; }
.modal-content > h3 + :not(.modal-footer) { padding-top:18px; }
.modal-content > h3 ~ :not(.modal-footer):nth-last-child(2) { padding-bottom:18px; }
.modal-content .modal-footer { display:flex; justify-content:flex-end; gap:8px; align-items:center; padding:14px 22px; border-top:1px solid var(--border); background:var(--surface-2); }
.modal-content .modal-cancel-btn { background:var(--surface); color:var(--text-2); border:1px solid var(--border); padding:6px 14px; border-radius:7px; font-size:13px; font-weight:500; }
.modal-content .modal-cancel-btn:hover { background:var(--surface-hover); border-color:var(--border-strong); color:var(--text); }
.modal-content .modal-save-btn { background:var(--accent); color:#fff; border:none; padding:6px 14px; border-radius:7px; font-size:13px; font-weight:500; }
.modal-content .modal-save-btn:hover { background:var(--accent-strong); }
.modal-content > .flex.items-start.justify-between:first-child {
  padding:16px 22px;
  margin:0 !important;
  background:var(--surface-2);
  border-bottom:1px solid var(--border);
  border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  gap:16px;
  position:sticky;
  top:0;
  z-index:2;
}
.modal-content > .flex.items-start.justify-between:first-child h3 {
  margin:0;
  font-size:15px !important;
  font-weight:600;
  letter-spacing:0.01em;
  color:var(--text) !important;
}
.modal-content > .flex.items-start.justify-between:first-child p {
  margin-top:3px !important;
  font-size:12.5px !important;
  color:var(--text-muted) !important;
}
.modal-content > .flex.items-start.justify-between:first-child button[id$="-close"],
.modal-content > .flex.items-start.justify-between:first-child button {
  width:28px;
  height:28px;
  display:grid;
  place-items:center;
  border-radius:6px;
  color:var(--text-muted) !important;
}
.modal-content > .flex.items-start.justify-between:first-child button:hover {
  background:var(--surface-hover);
  color:var(--text) !important;
}
.modal-content > form,
.modal-content > .space-y-4,
.modal-content > .space-y-5,
.modal-content > .space-y-6:not(:first-child) {
  padding:18px 22px 22px !important;
  margin:0 !important;
}
.modal-content > form > .flex.justify-end,
.modal-content > form > .border-t,
.modal-content > .flex.justify-end.border-t {
  margin:18px -22px -22px !important;
  padding:14px 22px !important;
  border-top:1px solid var(--border) !important;
  background:var(--surface-2);
}
.modal-content .bg-gray-50,
.modal-content .bg-white,
.modal-content .bg-blue-50,
.modal-content .bg-indigo-50 {
  background:var(--surface-2) !important;
  border-color:var(--border) !important;
}
.modal-content .text-gray-900,
.modal-content .text-gray-800,
.modal-content .text-gray-700 { color:var(--text) !important; }
.modal-content .text-gray-600,
.modal-content .text-gray-500,
.modal-content .text-gray-400 { color:var(--text-muted) !important; }
.inspector-profile-modal { background:rgba(20,19,15,0.45) !important; backdrop-filter:blur(5px); padding:24px 16px !important; z-index:10001 !important; }
.inspector-profile-modal .modal-content {
  background:var(--surface) !important;
  border:1px solid var(--border) !important;
  border-radius:var(--radius-lg) !important;
  box-shadow:var(--shadow-lg) !important;
  padding:0 !important;
  max-width:540px !important;
  max-height:calc(100vh - 48px) !important;
}
.inspector-profile-modal .modal-content > div:first-child {
  padding:16px 22px !important;
  margin:0 !important;
  background:var(--surface-2) !important;
  border-bottom:1px solid var(--border) !important;
  border-radius:var(--radius-lg) var(--radius-lg) 0 0 !important;
}
.inspector-profile-modal .modal-content > div:first-child h3 {
  margin:0 !important;
  font-size:15px !important;
  color:var(--text) !important;
}
.inspector-profile-modal .modal-content > div:nth-child(2) {
  padding:18px 22px 0 !important;
}
.inspector-profile-modal .modal-content > div:last-child {
  margin:18px 0 0 !important;
  padding:14px 22px !important;
  border-top:1px solid var(--border) !important;
  background:var(--surface-2) !important;
}
.inspector-profile-modal input,
.inspector-profile-modal textarea,
.inspector-profile-modal select {
  background:var(--bg-sunken) !important;
  border:1px solid var(--border) !important;
  border-radius:7px !important;
  color:var(--text) !important;
  padding:7px 10px !important;
}
.inspector-profile-modal label { color:var(--text-muted) !important; font-size:11.5px !important; font-weight:600 !important; text-transform:uppercase; letter-spacing:0.05em; }
.inspector-profile-modal p { color:var(--text-muted) !important; }
.inspector-profile-modal button { border-radius:7px !important; }
.inspector-profile-modal .profile-save-btn,
.inspector-profile-modal #sig-canvas-save { background:var(--accent) !important; color:#fff !important; }
.inspector-profile-modal .profile-cancel-btn,
.inspector-profile-modal #sig-canvas-clear { background:var(--surface) !important; color:var(--text-2) !important; border:1px solid var(--border) !important; }
.modal-content label { font-size:11.5px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted); display:block; margin-bottom:5px; }
.modal-content input[type=text], .modal-content input[type=tel], .modal-content input[type=number], .modal-content input[type=date], .modal-content input[type=time], .modal-content input[type=email], .modal-content input[type=password], .modal-content select, .modal-content textarea { width:100%; background:var(--bg-sunken); border:1px solid var(--border); border-radius:7px; padding:7px 10px; font-size:13px; color:var(--text); transition:border-color 120ms, box-shadow 120ms; }
.modal-content input[type=text]:focus, .modal-content input[type=tel]:focus, .modal-content input[type=number]:focus, .modal-content input[type=date]:focus, .modal-content input[type=time]:focus, .modal-content input[type=email]:focus, .modal-content select:focus, .modal-content textarea:focus { outline:none; border-color:var(--accent); background:var(--surface); box-shadow:0 0 0 3px var(--accent-soft); }
.modal-content .btn { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:7px; font-size:13px; font-weight:500; }
.modal-content .btn-primary { background:var(--accent); color:#fff; border:none; }
.modal-content .btn-primary:hover { background:var(--accent-strong); }
.modal-content .btn-secondary { background:var(--surface); color:var(--text-2); border:1px solid var(--border); }
.modal-content .btn-secondary:hover { background:var(--surface-hover); border-color:var(--border-strong); color:var(--text); }
.modal-content .btn-danger { background:var(--alert); color:#fff; border:none; }
.modal-content .btn-danger:hover { background:#991B1B; }
.modal-content.air-sample-edit-modal > h3 {
  padding:12px 18px !important;
}
.modal-content.air-sample-edit-modal {
  overflow-x:auto;
}
.modal-content.air-sample-edit-modal > h3 ~ :not(.modal-footer) {
  padding-left:18px !important;
  padding-right:18px !important;
}
.modal-content.air-sample-edit-modal > h3 + :not(.modal-footer) {
  padding-top:12px !important;
}
.modal-content.air-sample-edit-modal > h3 ~ :not(.modal-footer):nth-last-child(2) {
  padding-bottom:12px !important;
}
.modal-content.air-sample-edit-modal .modal-footer {
  padding:10px 18px !important;
}
.modal-content.air-sample-edit-modal label {
  margin-bottom:2px;
}
.modal-content.air-sample-edit-modal input,
.modal-content.air-sample-edit-modal select {
  padding-top:5px !important;
  padding-bottom:5px !important;
}
.modal-content.air-sample-edit-modal #edit-air-sample-layout {
  align-items:stretch !important;
}
.modal-content.air-sample-edit-modal #edit-sample-set-panel {
  align-self:stretch;
}
.modal-content.air-sample-edit-modal .sample-set-row {
  display:grid;
  grid-template-columns:minmax(205px, max-content) minmax(180px, 1fr);
  gap:8px;
  align-items:center;
  min-width:0;
}
.modal-content.air-sample-edit-modal .sample-set-label {
  min-width:0;
  white-space:nowrap;
}
.modal-content.air-sample-edit-modal .sample-set-location {
  width:100% !important;
  min-width:0 !important;
}
@media (max-width: 980px) {
  .modal-content.air-sample-edit-modal #edit-air-sample-layout {
    flex-direction:column !important;
  }
  .modal-content.air-sample-edit-modal #edit-air-sample-form-col,
  .modal-content.air-sample-edit-modal #edit-sample-set-panel {
    flex:1 1 auto !important;
    max-width:none !important;
    min-width:0 !important;
    width:100% !important;
  }
  .modal-content.air-sample-edit-modal #edit-sample-set-panel {
    border-left:0 !important;
    border-top:1px solid var(--border) !important;
    padding-left:0 !important;
    padding-top:1rem !important;
  }
  .modal-content.air-sample-edit-modal .sample-set-row {
    grid-template-columns:1fr;
  }
  .modal-content.air-sample-edit-modal .sample-set-location {
    margin-left:0 !important;
    width:100% !important;
    flex:1 1 100% !important;
  }
}

/* NOTIFICATIONS */
#notification-area { position:fixed; top:16px; right:16px; z-index:10010; display:flex; flex-direction:column; gap:8px; max-width:360px; }
#notification-area > div { padding:10px 14px; border-radius:8px; box-shadow:var(--shadow-lg); color:#fff; font-size:13px; font-weight:500; }

/* TWEAKS */
.tweaks-fab { position:fixed; bottom:16px; right:16px; z-index:9999; width:38px; height:38px; border-radius:999px; background:var(--surface); border:1px solid var(--border); box-shadow:var(--shadow); color:var(--text-muted); display:grid; place-items:center; }
.tweaks-fab:hover { color:var(--text); border-color:var(--border-strong); }
.tweaks-panel { position:fixed; bottom:64px; right:16px; z-index:9999; width:280px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); padding:14px 16px; }
.tweaks-panel[hidden] { display:none; }
.tweaks-panel h4 { font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin:0 0 8px; font-weight:600; }
.tweaks-row { margin-bottom:14px; }
.tweaks-row:last-child { margin-bottom:0; }
.tweaks-seg { display:flex; gap:6px; }
.tweaks-seg button { flex:1; padding:6px 8px; font-size:12px; border:1px solid var(--border); border-radius:6px; background:var(--bg-sunken); color:var(--text-2); }
.tweaks-seg button[data-active="true"] { background:var(--accent); color:#fff; border-color:var(--accent); }
.tweaks-toggle { display:flex; align-items:center; justify-content:space-between; }
.tw-switch { width:32px; height:18px; border-radius:999px; background:var(--border); position:relative; transition:background 120ms; }
.tw-switch[data-on="true"] { background:var(--accent); }
.tw-switch::after { content:''; position:absolute; left:2px; top:2px; width:14px; height:14px; background:#fff; border-radius:50%; transition:transform 120ms; }
.tw-switch[data-on="true"]::after { transform:translateX(14px); }
.tweaks-swatches { display:flex; gap:8px; }
.tweaks-swatches button { width:24px; height:24px; border-radius:6px; border:2px solid transparent; }
.tweaks-swatches button[data-active="true"] { border-color:var(--text); }

.empty-state { padding:48px 24px; text-align:center; background:var(--surface); border:1px dashed var(--border-strong); border-radius:var(--radius-lg); color:var(--text-muted); }
.empty-state .title { font-size:14px; font-weight:600; color:var(--text-2); margin-bottom:4px; }
.empty-state .sub { font-size:12.5px; color:var(--text-muted); }

* { scrollbar-width:thin; scrollbar-color:transparent transparent; }
*:hover, *:focus, *:active { scrollbar-color:rgba(156,163,175,0.5) transparent; }
::-webkit-scrollbar { width:8px; height:8px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:transparent; border-radius:4px; }
*:hover::-webkit-scrollbar-thumb, *:focus::-webkit-scrollbar-thumb, *:active::-webkit-scrollbar-thumb { background:rgba(156,163,175,0.5); }

.signature-pad { background:#fff; border:1px solid var(--border); border-radius:8px; cursor:crosshair; touch-action:none; max-width:100%; }
.signature-ink { stroke:#14130F; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; fill:none; }

/* PRINT */
@media print { .sidebar, .topbar, .tweaks-fab, .tweaks-panel, #notification-area { display:none !important; } .app-shell, .app-main, .app-content { display:block !important; overflow:visible !important; height:auto !important; } .proj-content { padding:0 !important; } }
    </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="app-sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <div class="brand-text">
        <div class="brand-name">Oversight</div>
        <div class="brand-org">AsbTrack</div>
      </div>
      <button class="icon-btn sidebar-toggle" id="sidebar-collapse-btn" title="Toggle sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item" data-nav="today" title="Today">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
        <span class="nav-label">Today</span>
      </a>
      <a href="index.html?view=projects" class="nav-item" data-nav="projects" title="All Projects">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span class="nav-label">All Projects</span>
        <span class="nav-count" id="nav-projects-count">0</span>
      </a>
      <a href="index.html?view=archive" class="nav-item" data-nav="archive" title="Archive">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="5"/><path d="M4 8v13h16V8"/><path d="M10 12h4"/></svg>
        <span class="nav-label">Archive</span>
        <span class="nav-count" id="nav-archive-count">0</span>
      </a>
    </nav>
    <div class="sidebar-section">
      <div class="sidebar-label">Active projects</div>
      <div class="sidebar-projects" id="sidebar-projects"></div>
    </div>
    <div class="sidebar-foot">
      <button class="inspector-card" id="inspector-profile-btn" title="Inspector Profile">
        <div class="ins-avatar" id="ins-avatar">U</div>
        <div class="ins-text">
          <div class="ins-name" id="inspector-profile-name">Set Profile</div>
          <div class="ins-meta">Inspector</div>
        </div>
      </button>
    </div>
  </aside>

  <div class="app-main">

      <div class="topbar-left">
        <div class="crumbs" id="topbar-crumbs">

          <span class="crumb-sep">/</span>
          <span class="crumb-current" id="crumb-project">Project</span>
        </div>
      </div>
      <div class="topbar-right">
        <a href="index.html" class="btn-ghost"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Back</a>
      </div>
    </header>

    <main class="app-content" id="app-content">
      <div class="view project-view" id="project-workspace">
        <header class="proj-head">
          <div class="proj-head-main">
            <div class="proj-head-row">
              <span class="pill-num mono" id="proj-head-num">—</span>
              <span class="status-pill active" id="proj-head-status"><span class="dot"></span><span id="proj-head-status-label">Active</span></span>
            </div>
            <h1 class="page-title" id="oversight-project-number">Loading…</h1>
            <div class="proj-head-meta" id="proj-head-meta"></div>
          </div>
          <div class="proj-head-side">

            </div>
          </div>
        </header>

        <nav class="proj-tabs" id="proj-tabs" role="tablist">

          <button class="proj-tab" data-tab="team" role="tab"><span>Workers</span> <span class="tab-count mono" id="tabcount-workers">0</span></button>
