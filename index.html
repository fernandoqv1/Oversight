    <style>
/* ============================================================================
   OVERSIGHT REDESIGN — DESIGN SYSTEM
   Source: oversight_example/Oversight.html (production-ported)
   ============================================================================ */
:root {
  --accent: #015dab;
  --accent-soft: color-mix(in oklch, var(--accent) 12%, transparent);
  --accent-strong: color-mix(in oklch, var(--accent) 80%, black);

  --bg: #FAFAF7;
  --bg-sunken: #F4F3EE;
  --surface: #FFFFFF;
  --surface-2: #FCFBF8;
  --surface-hover: #F5F4EF;
  --border: #E8E5DE;
  --border-strong: #D5D1C7;
  --text: #14130F;
  --text-2: #4A4943;
  --text-muted: #8A887E;
  --text-faint: #B6B3A8;

  --side-bg: #1B1A17;
  --side-surface: #25231F;
  --side-border: #2F2D28;
  --side-text: #E9E7DF;
  --side-text-muted: #8B887D;
  --side-text-faint: #5C5A53;

  --st-prep-bg:#DCE7F8; --st-prep-fg:#1E3A8A;
  --st-active-bg:#F8E4C4; --st-active-fg:#92400E;
  --st-clear-bg:#E8DDF5; --st-clear-fg:#5B21B6;
  --st-down-bg:#F8D5BC; --st-down-fg:#9A3412;
  --st-done-bg:#D2E9D6; --st-done-fg:#14532D;

  --ok:#15803D; --ok-bg:#DCEEDA;
  --warn:#B45309; --warn-bg:#F8E4C4;
  --alert:#B91C1C; --alert-bg:#F4D7D3;
  --info:#1E40AF; --info-bg:#DCE7F8;

  --radius: 8px;
  --radius-lg: 12px;
  --radius-sm: 6px;
  --shadow-sm: 0 1px 2px rgba(20, 19, 15, 0.04);
  --shadow: 0 1px 3px rgba(20, 19, 15, 0.05), 0 0 0 1px rgba(20, 19, 15, 0.03);
  --shadow-lg: 0 12px 32px -8px rgba(20, 19, 15, 0.18);
}
[data-theme="dark"] {
  --bg:#100F0C; --bg-sunken:#0A0908; --surface:#181612; --surface-2:#1D1B16; --surface-hover:#221F1A;
  --border:#2A2823; --border-strong:#3A3731;
  --text:#ECE9DF; --text-2:#B6B2A4; --text-muted:#7A766B; --text-faint:#4F4D45;
  --side-bg:#060604; --side-surface:#0E0D0A; --side-border:#1A1814;
  --st-prep-bg:#1E2A4A; --st-prep-fg:#BFD0F2;
  --st-active-bg:#3A2A14; --st-active-fg:#F4C97D;
  --st-clear-bg:#2E1F44; --st-clear-fg:#D7C2F2;
  --st-down-bg:#3A2114; --st-down-fg:#F4B888;
  --st-done-bg:#142E1E; --st-done-fg:#97D5A4;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.5);
  --shadow:0 1px 3px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04);
  --shadow-lg:0 12px 32px -8px rgba(0,0,0,0.6);
}
[data-density="compact"] { --pad-1:6px; --pad-2:8px; --pad-3:12px; --pad-4:14px; --pad-5:18px; --pad-6:22px; --row-h:30px; --tab-pad:8px 12px; }
[data-density="comfortable"], :root { --pad-1:8px; --pad-2:12px; --pad-3:16px; --pad-4:20px; --pad-5:24px; --pad-6:32px; --row-h:38px; --tab-pad:10px 14px; }

/* RESET / BASE */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin:0; padding:0; height:100%; }
body { font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background:var(--bg); color:var(--text); font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; font-feature-settings:'cv11','ss01'; }
button { font:inherit; color:inherit; background:none; border:none; cursor:pointer; padding:0; }
input, select, textarea { font:inherit; color:inherit; }
a { color:inherit; text-decoration:none; }
.mono { font-family:ui-monospace, 'IBM Plex Mono', SFMono-Regular, Menlo, monospace; font-feature-settings:'zero','ss01'; }
.small { font-size:12px; }
.muted { color:var(--text-muted); }
[data-mono-num="on"] .stat-num, [data-mono-num="on"] .kpi-num { font-family:ui-monospace,'IBM Plex Mono',monospace; font-weight:500; letter-spacing:-0.02em; }

.app-shell { height:100vh; display:flex; }

/* SIDEBAR */
.sidebar { width:256px; background:var(--side-bg); color:var(--side-text); display:flex; flex-direction:column; border-right:1px solid var(--side-border); flex-shrink:0; transition:width 200ms ease; }
.sidebar[data-collapsed="true"] { width:64px; }
.sidebar-brand { display:flex; align-items:center; gap:10px; padding:18px 16px 16px; }
.brand-mark { width:32px; height:32px; background:linear-gradient(135deg, var(--accent), color-mix(in oklch, var(--accent) 60%, black)); color:white; border-radius:8px; display:grid; place-items:center; flex-shrink:0; }
.brand-text { display:flex; flex-direction:column; line-height:1.2; min-width:0; }
.brand-name { font-size:15px; font-weight:600; color:var(--side-text); }
.brand-org { font-size:11px; color:var(--side-text-muted); margin-top:1px; }
.sidebar[data-collapsed="true"] .brand-text { display:none; }
.sidebar-toggle { margin-left:auto; color:var(--side-text-muted); }
.sidebar-toggle:hover { background:var(--side-surface); color:var(--side-text); }
.sidebar[data-collapsed="true"] .sidebar-brand { flex-direction:column; gap:8px; padding:16px 12px 10px; }
.sidebar[data-collapsed="true"] .sidebar-toggle { margin-left:0; }
.sidebar-nav { padding:4px 8px 12px; display:flex; flex-direction:column; gap:1px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:8px 10px; color:var(--side-text-muted); border-radius:6px; font-size:13px; font-weight:500; width:100%; text-align:left; }
.nav-item:hover { background:var(--side-surface); color:var(--side-text); }
.nav-item[data-active="true"] { background:var(--side-surface); color:var(--side-text); }
.nav-label { flex:1; }
.sidebar[data-collapsed="true"] .nav-label, .sidebar[data-collapsed="true"] .nav-count { display:none; }
.nav-count { font-size:11px; background:rgba(255,255,255,0.06); padding:1px 6px; border-radius:999px; color:var(--side-text-muted); }
.sidebar-section { flex:1; padding:6px 8px; overflow:auto; min-height:0; }
.sidebar[data-collapsed="true"] .sidebar-section { display:none; }
.sidebar-label { font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; color:var(--side-text-faint); padding:12px 10px 6px; font-weight:600; }
.sidebar-projects { display:flex; flex-direction:column; gap:1px; }
.proj-item { display:flex; align-items:center; gap:10px; padding:7px 10px; border-radius:6px; text-align:left; color:var(--side-text-muted); width:100%; min-width:0; }
.proj-item:hover { background:var(--side-surface); color:var(--side-text); }
.proj-item[data-active="true"] { background:var(--side-surface); color:var(--side-text); }
.proj-dot { width:6px; height:6px; border-radius:50%; background:#4ADE80; flex-shrink:0; }
.proj-dot[data-overdue="true"] { background:#F87171; }
.proj-dot[data-status="completed"] { background:#94A3B8; }
.proj-text { display:flex; flex-direction:column; min-width:0; flex:1; }
.proj-num { font-family:ui-monospace,'IBM Plex Mono',monospace; font-size:11px; color:var(--side-text-faint); }
.proj-site { font-size:13px; color:inherit; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.proj-pip { background:var(--accent); color:white; font-size:10px; font-weight:600; padding:1px 6px; border-radius:999px; }
.sidebar-foot { padding:10px 12px; border-top:1px solid var(--side-border); }
.inspector-card { display:flex; align-items:center; gap:10px; width:100%; }
.inspector-card:hover .ins-name { color:var(--accent); }
.ins-avatar { width:28px; height:28px; border-radius:999px; background:linear-gradient(135deg, var(--accent), color-mix(in oklch, var(--accent) 60%, black)); color:white; display:grid; place-items:center; font-size:11px; font-weight:600; flex-shrink:0; }
.ins-text { display:flex; flex-direction:column; line-height:1.25; min-width:0; text-align:left; }
.sidebar[data-collapsed="true"] .ins-text { display:none; }
.ins-name { font-size:13px; color:var(--side-text); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ins-meta { font-size:11px; color:var(--side-text-faint); font-family:ui-monospace,'IBM Plex Mono',monospace; }

/* APP MAIN */
.app-main { flex:1; display:flex; flex-direction:column; min-width:0; }
.app-content { flex:1; overflow:auto; }

/* TOPBAR */
.topbar { height:52px; display:flex; align-items:center; border-bottom:1px solid var(--border); background:var(--surface); padding:0 20px; gap:16px; flex-shrink:0; }
.topbar-left { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.topbar-mid { flex:1; max-width:480px; }
.topbar-right { display:flex; align-items:center; gap:6px; margin-left:auto; }
.crumbs { display:flex; align-items:center; gap:6px; font-size:13px; }
.crumb { color:var(--text-muted); }
.crumb-current { color:var(--text); font-weight:500; }
.crumb-sep { color:var(--text-faint); }
.search { display:flex; align-items:center; gap:8px; padding:6px 12px; background:var(--bg-sunken); border:1px solid var(--border); border-radius:8px; width:100%; color:var(--text-muted); }
.search input { flex:1; border:none; outline:none; background:none; font-size:13px; color:var(--text); }
.search input::placeholder { color:var(--text-muted); }
.kbd { font-family:ui-monospace,'IBM Plex Mono',monospace; font-size:10.5px; padding:2px 6px; background:var(--surface); border:1px solid var(--border); border-radius:4px; color:var(--text-muted); }

/* BUTTONS */
.btn-primary, .btn-ghost { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:7px; font-size:13px; font-weight:500; white-space:nowrap; transition:background 120ms, border-color 120ms; }
.btn-primary { background:var(--accent); color:white; }
.btn-primary:hover { background:var(--accent-strong); }
.btn-primary.small { padding:4px 10px; font-size:12px; }
.btn-primary:disabled, .btn-ghost:disabled, .icon-btn:disabled { opacity:0.45; cursor:not-allowed; pointer-events:none; }
.btn-ghost { background:var(--surface); color:var(--text-2); border:1px solid var(--border); }
.btn-ghost:hover { background:var(--surface-hover); border-color:var(--border-strong); color:var(--text); }
.btn-ghost.small { padding:4px 10px; font-size:12px; }
.btn-ghost.danger { color:var(--alert); border-color:color-mix(in srgb, var(--alert) 30%, var(--border)); }
.btn-ghost.danger:hover { background:var(--alert-bg); color:var(--alert); }
.btn-link { color:var(--accent); font-size:13px; font-weight:500; }
.btn-link:hover { color:var(--accent-strong); text-decoration:underline; }
.btn-link.small { font-size:12px; }
.icon-btn { width:30px; height:30px; display:grid; place-items:center; border-radius:6px; color:var(--text-muted); position:relative; }
.icon-btn:hover { background:var(--surface-hover); color:var(--text); }
.icon-btn.small { width:24px; height:24px; }
.dot-badge { position:absolute; top:6px; right:6px; width:6px; height:6px; border-radius:50%; background:var(--accent); }

/* VIEW */
.view { padding:28px 32px 60px; }
[data-density="compact"] .view { padding:20px 24px 40px; }
.page-head { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:24px; gap:20px; flex-wrap:wrap; }
.page-title { font-size:24px; font-weight:600; margin:0; letter-spacing:-0.012em; color:var(--text); }
.page-sub { font-size:13px; color:var(--text-muted); margin:4px 0 0; }
.head-actions { display:flex; gap:8px; align-items:center; }

/* TODAY GRID */
.today-grid { display:grid; grid-template-columns:minmax(0,1.3fr) minmax(0,1fr); grid-template-areas:"act running" "snap snap"; gap:16px; }
.today-grid > .activity-panel { grid-area:act; }
.today-grid > .running-panel { grid-area:running; }
.today-grid > .snap-panel { grid-area:snap; }
.hidden { display:none !important; }
.panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
.panel-head { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); background:var(--surface-2); }
.panel-title { font-size:13px; font-weight:600; margin:0; letter-spacing:0.01em; color:var(--text); }
.attn-list, .running-list { list-style:none; padding:0; margin:0; }
.attn-row { display:flex; align-items:center; gap:12px; padding:12px 18px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 120ms; }
.attn-row:last-child { border-bottom:none; }
.attn-row:hover { background:var(--surface-hover); }
.attn-sev { width:26px; height:26px; border-radius:50%; display:grid; place-items:center; flex-shrink:0; }
.attn-sev[data-sev="alert"] { background:var(--alert-bg); color:var(--alert); }
.attn-sev[data-sev="warn"] { background:var(--warn-bg); color:var(--warn); }
.attn-sev[data-sev="todo"] { background:var(--bg-sunken); color:var(--text-muted); }
.attn-sev[data-sev="ready"] { background:var(--ok-bg); color:var(--ok); }
.attn-text { flex:1; min-width:0; }
.attn-label { font-size:13px; font-weight:500; }
.attn-meta { font-size:12px; color:var(--text-muted); margin-top:2px; }
.empty-row { padding:24px; color:var(--text-muted); font-size:13px; text-align:center; list-style:none; }
.running-row { padding:14px 18px; border-bottom:1px solid var(--border); }
.running-row:last-child { border-bottom:none; }
.run-head { display:flex; justify-content:space-between; align-items:baseline; }
.code { font-size:13px; font-weight:500; }
.run-meta { display:flex; gap:18px; margin-top:4px; font-size:12px; color:var(--text-2); }
.run-meta b { font-family:ui-monospace,'IBM Plex Mono',monospace; font-weight:500; }
.progress { margin-top:8px; height:4px; background:var(--bg-sunken); border-radius:2px; overflow:hidden; }
.progress > span { display:block; height:100%; background:var(--accent); border-radius:2px; }
.activity-list { list-style:none; padding:6px 0; margin:0; }
.activity-list.compact { padding:4px 0; }
.activity-row { display:grid; grid-template-columns:14px 60px 30px 1fr; align-items:center; gap:10px; padding:7px 18px; font-size:13px; }
.act-marker { width:8px; height:8px; border-radius:50%; background:var(--text-faint); }
.act-marker.act-sample { background:var(--info); }
.act-marker.act-log { background:var(--accent); }
.act-marker.act-doc { background:var(--text-muted); }
.act-marker.act-stage { background:var(--ok); }
.act-marker.act-inspection.act-pass { background:var(--ok); }
.act-marker.act-inspection.act-fail { background:var(--alert); }
.act-time { color:var(--text-muted); }
.act-who { font-weight:600; color:var(--text-2); font-size:11px; font-family:ui-monospace,'IBM Plex Mono',monospace; }
.act-text { color:var(--text-2); }
.snap-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border); border-bottom:1px solid var(--border); }
.stat { background:var(--surface); padding:16px 18px; }
.stat-hl { background:var(--accent-soft); }
.stat-label { font-size:11.5px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.04em; font-weight:500; }
.stat-value { display:flex; align-items:baseline; gap:6px; margin-top:4px; }
.stat-num { font-size:26px; font-weight:600; letter-spacing:-0.02em; }
.stat-unit { color:var(--text-muted); font-size:13px; }
.stat-sub { font-size:12px; color:var(--text-muted); margin-top:2px; }
.snap-projects { padding:8px 0 4px; }
.proj-row-head { font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); font-weight:600; padding:10px 18px 6px; }
.proj-row { display:flex; align-items:center; gap:16px; padding:10px 18px; width:100%; text-align:left; transition:background 120ms; }
.proj-row:hover { background:var(--surface-hover); }
.proj-row-main { flex:1; min-width:0; }
.proj-row-num { font-size:11px; color:var(--text-muted); font-family:ui-monospace,'IBM Plex Mono',monospace; }
.proj-row-site { font-size:13px; font-weight:500; margin-top:1px; color:var(--text); }
.proj-row-meta { display:flex; align-items:center; gap:14px; }
.bar { width:80px; height:4px; background:var(--bg-sunken); border-radius:2px; overflow:hidden; }
.bar > span { display:block; height:100%; background:var(--accent); }
.due-pill { font-size:11px; padding:2px 8px; border-radius:4px; background:var(--bg-sunken); color:var(--text-2); font-family:ui-monospace,'IBM Plex Mono',monospace; }
.due-pill.overdue { background:var(--alert-bg); color:var(--alert); font-weight:500; }

/* PROJECTS TABLE / ARCHIVE */
.seg { display:flex; background:var(--bg-sunken); border:1px solid var(--border); border-radius:7px; padding:2px; }
.seg-btn { padding:4px 12px; border-radius:5px; font-size:12px; color:var(--text-muted); font-weight:500; }
.seg-btn[data-active="true"] { background:var(--surface); color:var(--text); box-shadow:var(--shadow-sm); }
.proj-table { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
.proj-th, .proj-tr { display:grid; grid-template-columns:2.2fr 1fr 1.4fr 0.7fr 0.7fr 1fr 80px; align-items:center; gap:16px; padding:12px 20px; }
.proj-th { font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); font-weight:600; background:var(--surface-2); border-bottom:1px solid var(--border); }
.proj-tr { border-bottom:1px solid var(--border); cursor:pointer; transition:background 120ms; }
.proj-tr:last-child { border-bottom:none; }
.proj-tr:hover { background:var(--surface-hover); }
.proj-cell-main { display:flex; align-items:flex-start; gap:12px; }
.proj-cell-main .proj-dot { margin-top:6px; flex-shrink:0; }
.proj-cell-num { font-size:11px; color:var(--text-muted); font-family:ui-monospace,'IBM Plex Mono',monospace; }
.proj-cell-site { font-size:14px; font-weight:500; margin-top:1px; color:var(--text); }
.proj-cell-addr { margin-top:2px; font-size:12px; color:var(--text-muted); }
.proj-cell { display:flex; align-items:center; gap:10px; font-size:13px; color:var(--text-2); }
.archive-list { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
.arc-row { display:grid; grid-template-columns:1fr 2fr 1.5fr auto; align-items:center; gap:14px; padding:14px 18px; border-bottom:1px solid var(--border); }
.arc-row:last-child { border-bottom:none; }

/* STAGE BADGES & TAGS */
.stage-badge { display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:500; padding:2px 7px; border-radius:4px; line-height:1; }
.stage-dot { width:6px; height:6px; border-radius:50%; }
.stage-prep { background:var(--st-prep-bg); color:var(--st-prep-fg); }
.stage-prep .stage-dot { background:var(--st-prep-fg); }
.stage-active { background:var(--st-active-bg); color:var(--st-active-fg); }
.stage-active .stage-dot { background:var(--st-active-fg); }
.stage-clear { background:var(--st-clear-bg); color:var(--st-clear-fg); }
.stage-clear .stage-dot { background:var(--st-clear-fg); }
.stage-down { background:var(--st-down-bg); color:var(--st-down-fg); }
.stage-down .stage-dot { background:var(--st-down-fg); }
.stage-done { background:var(--st-done-bg); color:var(--st-done-fg); }
.stage-done .stage-dot { background:var(--st-done-fg); }
.tag { font-size:11px; padding:2px 7px; border-radius:4px; background:var(--bg-sunken); color:var(--text-2); font-weight:500; }
.tag-reg { background:var(--alert-bg); color:var(--alert); }
.tag-done { background:var(--ok-bg); color:var(--ok); }
.tag-background { background:var(--st-prep-bg); color:var(--st-prep-fg); }
.tag-area { background:var(--st-clear-bg); color:var(--st-clear-fg); }
.tag-personal { background:var(--st-active-bg); color:var(--st-active-fg); }
.tag-clearance { background:var(--st-done-bg); color:var(--st-done-fg); }

/* MODAL */
.modal { display:none; position:fixed; z-index:10001; left:0; top:0; width:100%; height:100%; overflow:auto; background-color:rgba(20,19,15,0.45); backdrop-filter:blur(5px); align-items:flex-start; justify-content:center; padding:24px 16px; pointer-events:auto; }
.modal.active { display:flex; }
.modal-content { position:relative; z-index:1; pointer-events:auto; isolation:isolate; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); width:100%; max-width:640px; max-height:calc(100vh - 48px); overflow-y:auto; padding:0; margin:auto; }
